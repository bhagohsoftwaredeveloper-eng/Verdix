<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verdix License Generator</title>
  <style>
    :root {
      --bg: #0f1117; --panel: #181b24; --border: #2a2f3a; --muted: #8b93a7;
      --text: #e6e9f0; --accent: #6366f1; --accent-2: #8b5cf6; --good: #22c55e; --bad: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #1c2030 0%, var(--bg) 55%);
      color: var(--text); display: flex; align-items: flex-start; justify-content: center; padding: 40px 16px;
    }
    .wrap { width: 100%; max-width: 560px; }
    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .logo {
      width: 44px; height: 44px; border-radius: 12px; display: grid; place-items: center;
      background: linear-gradient(135deg, var(--accent), var(--accent-2)); font-weight: 800; font-size: 20px;
    }
    .brand h1 { font-size: 20px; margin: 0; letter-spacing: .3px; }
    .brand p { margin: 2px 0 0; font-size: 12px; color: var(--muted); }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
    label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin: 16px 0 6px; }
    input, select, textarea {
      width: 100%; padding: 11px 12px; background: #11141c; border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-size: 14px; outline: none; font-family: inherit;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; font-family: ui-monospace, 'Cascadia Code', monospace; font-size: 12px; }
    .row { display: flex; gap: 12px; }
    .row > div { flex: 1; }
    .seg { display: flex; gap: 8px; margin-top: 6px; }
    .seg button {
      flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border); background: #11141c;
      color: var(--muted); font-weight: 600; cursor: pointer; font-size: 13px;
    }
    .seg button.active { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; border-color: transparent; }
    .gen {
      margin-top: 22px; width: 100%; padding: 13px; border: none; border-radius: 11px; cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; font-size: 15px; font-weight: 700;
    }
    .gen:disabled { opacity: .5; cursor: not-allowed; }
    .hint { font-size: 11px; color: var(--muted); margin-top: 6px; }
    .result { margin-top: 20px; display: none; }
    .result.show { display: block; }
    .keybox { background: #0b0d13; border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
    .keybox code { display: block; font-family: ui-monospace, monospace; font-size: 12px; word-break: break-all; line-height: 1.6; color: #c7d2fe; }
    .meta { font-size: 12px; color: var(--muted); margin: 4px 0 12px; }
    .copy { margin-top: 12px; width: 100%; padding: 11px; border-radius: 10px; border: 1px solid var(--border); background: #11141c; color: var(--text); font-weight: 600; cursor: pointer; }
    .copy.done { border-color: var(--good); color: var(--good); }
    .err { display: none; margin-top: 14px; padding: 11px 13px; border-radius: 10px; background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.4); color: #fca5a5; font-size: 13px; }
    .err.show { display: block; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <div class="logo">V</div>
      <div>
        <h1>Verdix License Generator</h1>
        <p>Sign a machine-locked license key (Ed25519)</p>
      </div>
    </div>

    <div class="card">
      <label>Customer / Business Name</label>
      <input id="customer" placeholder="e.g. Juan's Sari-Sari Store" />

      <label>Machine ID <span style="text-transform:none;color:var(--muted)">(from the customer's POS activation screen)</span></label>
      <textarea id="machineId" rows="2" placeholder="ABCD-1234-EF56-..."></textarea>

      <div class="row">
        <div>
          <label>Edition</label>
          <select id="edition">
            <option value="standard">Standard</option>
            <option value="enterprise">Enterprise</option>
            <option value="trial">Trial</option>
          </select>
        </div>
        <div>
          <label>Features <span style="text-transform:none;color:var(--muted)">(optional, comma-sep)</span></label>
          <input id="features" placeholder="reports, multi-terminal" />
        </div>
      </div>

      <label>License Type</label>
      <div class="seg">
        <button id="btn-perpetual" class="active" onclick="setType('perpetual')">Perpetual</button>
        <button id="btn-subscription" onclick="setType('subscription')">Subscription</button>
      </div>

      <div id="sub-options" class="hidden">
        <div class="row">
          <div>
            <label>Duration (days)</label>
            <input id="days" type="number" min="1" placeholder="365" />
          </div>
          <div>
            <label>or Expiry Date</label>
            <input id="expiresDate" type="date" />
          </div>
        </div>
        <p class="hint">Fill either the number of days OR a specific expiry date.</p>
      </div>

      <button id="gen" class="gen" onclick="generate()">Generate License Key</button>
      <div id="err" class="err"></div>

      <div id="result" class="result">
        <div class="meta" id="result-meta"></div>
        <div class="keybox"><code id="keyout"></code></div>
        <button id="copy" class="copy" onclick="copyKey()">Copy License Key</button>
      </div>
    </div>
  </div>

  <script>
    let type = 'perpetual';
    function setType(t) {
      type = t;
      document.getElementById('btn-perpetual').classList.toggle('active', t === 'perpetual');
      document.getElementById('btn-subscription').classList.toggle('active', t === 'subscription');
      document.getElementById('sub-options').classList.toggle('hidden', t !== 'subscription');
    }

    async function generate() {
      const btn = document.getElementById('gen');
      const err = document.getElementById('err');
      const result = document.getElementById('result');
      err.classList.remove('show');
      result.classList.remove('show');
      btn.disabled = true;
      btn.textContent = 'Generating…';

      const payload = {
        customer: document.getElementById('customer').value,
        machineId: document.getElementById('machineId').value,
        edition: document.getElementById('edition').value,
        features: document.getElementById('features').value,
        type,
        days: document.getElementById('days').value,
        expiresDate: document.getElementById('expiresDate').value,
      };

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const json = await res.json();
        if (!res.ok || json.error) throw new Error(json.error || 'Failed to generate.');

        document.getElementById('keyout').textContent = json.key;
        const p = json.payload;
        const exp = p.expires ? ('Expires ' + p.expires.slice(0, 10)) : 'Perpetual (no expiry)';
        document.getElementById('result-meta').textContent =
          p.customer + ' • ' + p.edition + ' • ' + exp;
        result.classList.add('show');
      } catch (e) {
        err.textContent = e.message;
        err.classList.add('show');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generate License Key';
      }
    }

    async function copyKey() {
      const key = document.getElementById('keyout').textContent;
      const btn = document.getElementById('copy');
      try {
        await navigator.clipboard.writeText(key);
        btn.textContent = '✓ Copied!';
        btn.classList.add('done');
        setTimeout(() => { btn.textContent = 'Copy License Key'; btn.classList.remove('done'); }, 1600);
      } catch {
        btn.textContent = 'Copy failed — select manually';
      }
    }
  </script>
</body>
</html>
